<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Graphplan Visualizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ── App Shell ──────────────────────────────────────────── -->
  <div id="app">

    <header id="topbar">
      <div id="title-block">
        <span id="logo">⬡</span>
        <div>
          <h1>Graphplan</h1>
          <p id="subtitle">Planning Graph Visualizer — Blum &amp; Furst 1997</p>
        </div>
      </div>

      <nav id="controls">
        <label class="toggle">
          <input type="checkbox" id="chk-noops" checked />
          <span class="toggle-track"></span>
          <span class="toggle-label">No-ops</span>
        </label>
        <label class="toggle">
          <input type="checkbox" id="chk-del" checked />
          <span class="toggle-track"></span>
          <span class="toggle-label">Delete edges</span>
        </label>
        <label class="toggle">
          <input type="checkbox" id="chk-mutex" checked />
          <span class="toggle-track"></span>
          <span class="toggle-label">Mutex arcs</span>
        </label>
        <button id="btn-reset">↺ Reset</button>
      </nav>
    </header>

    <!-- ── Legend ─────────────────────────────────────────────── -->
    <div id="legend">
      <div class="leg-group">
        <span class="leg-item">
          <svg width="22" height="22"><circle cx="11" cy="11" r="8" fill="#2c7be5" stroke="#1a5cb4" stroke-width="1.5"/></svg>
          Proposition
        </span>
        <span class="leg-item">
          <svg width="22" height="22"><circle cx="11" cy="11" r="8" fill="#f39c12" stroke="#d35400" stroke-width="2.5"/></svg>
          Goal
        </span>
        <span class="leg-item">
          <svg width="32" height="22"><rect x="2" y="5" width="28" height="12" rx="3" fill="#e67e22" stroke="#b45e00" stroke-width="1.5"/></svg>
          Action
        </span>
        <span class="leg-item">
          <svg width="32" height="22"><rect x="2" y="5" width="28" height="12" rx="3" fill="#95a5a6" stroke="#717d7e" stroke-width="1.5"/></svg>
          No-op
        </span>
      </div>
      <div class="leg-sep"></div>
      <div class="leg-group">
        <span class="leg-item">
          <svg width="36" height="12"><line x1="0" y1="6" x2="36" y2="6" stroke="#3498db" stroke-width="2"/><polygon points="30,2 36,6 30,10" fill="#3498db"/></svg>
          Precondition
        </span>
        <span class="leg-item">
          <svg width="36" height="12"><line x1="0" y1="6" x2="36" y2="6" stroke="#27ae60" stroke-width="2"/><polygon points="30,2 36,6 30,10" fill="#27ae60"/></svg>
          Add effect
        </span>
        <span class="leg-item">
          <svg width="36" height="12"><line x1="0" y1="6" x2="36" y2="6" stroke="#e74c3c" stroke-width="2" stroke-dasharray="5,3"/><polygon points="30,2 36,6 30,10" fill="#e74c3c"/></svg>
          Delete effect
        </span>
        <span class="leg-item">
          <svg width="36" height="12"><path d="M0,10 Q18,-2 36,10" stroke="#9b59b6" stroke-width="2" fill="none" stroke-dasharray="4,3"/></svg>
          Mutex
        </span>
      </div>
      <div class="leg-hint">Click any node to highlight its connections.</div>
    </div>

    <!-- ── Visualization canvas ──────────────────────────────── -->
    <main id="viz-wrap">
      <div id="viz"></div>
    </main>

  </div>

  <!-- ── Tooltip ───────────────────────────────────────────────── -->
  <div id="tooltip" role="tooltip" aria-hidden="true"></div>

  <!-- ── Scripts ──────────────────────────────────────────────── -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
  <!--
    graph_data.js is generated by graphplan
    If it is missing you will see an error message in the viz panel.
  -->
  <script src="graph_data.js" onerror="window.__dataLoadFailed=true"></script>
  <script src="js/data.js"></script>
  <script src="js/graph.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
